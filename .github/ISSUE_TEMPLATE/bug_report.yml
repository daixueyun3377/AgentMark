name: Bug 报告
description: 报告一个 Bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量提供完整信息以便我们快速定位问题。

  - type: input
    id: version
    attributes:
      label: AgentMark 版本
      placeholder: "0.0.5"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: JDK 版本
      placeholder: "1.8.0_382 / 17.0.18"
    validations:
      required: true

  - type: input
    id: spring-boot-version
    attributes:
      label: Spring Boot 版本
      placeholder: "2.7.18 / 3.2.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: 模型提供者
      options:
        - Claude
        - OpenAI
        - 通义千问（OpenAI 兼容）
        - DeepSeek（OpenAI 兼容）
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 提供最小可复现代码或步骤
      render: java
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 包含错误日志或堆栈信息
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他有助于定位问题的信息
