name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望的功能。

  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 你遇到了什么问题，或者想解决什么场景？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望 AgentMark 如何支持这个功能？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你目前是如何解决这个问题的？

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关信息、截图或参考链接
